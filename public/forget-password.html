<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forget Password</title>
</head>
<style>
    /* ===== RESET ===== */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
    }

    body {
        font-family: 'Inter', sans-serif;
        background: linear-gradient(135deg, #eef2ff, #f8fafc);
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
    }

    /* ===== CARD ===== */
    #forgot-form {
        background: white;
        padding: 30px 25px;
        border-radius: 14px;
        width: 100%;
        max-width: 380px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    /* Title (optional if you add one) */
    h2 {
        text-align: center;
        margin-bottom: 20px;
    }

    /* ===== INPUT ===== */
    #forgot-form div {
        margin-bottom: 15px;
    }

    label {
        font-size: 14px;
        margin-bottom: 5px;
        display: block;
        font-weight: 500;
        color: #374151;
    }

    input {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: 1px solid #e5e7eb;
        transition: 0.2s;
    }

    input:focus {
        border-color: #6366f1;
        box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
        outline: none;
    }

    /* ===== BUTTON ===== */
    button {
        width: 100%;
        padding: 10px;
        border-radius: 8px;
        border: none;
        background: linear-gradient(135deg, #6366f1, #4f46e5);
        color: white;
        font-weight: 500;
        cursor: pointer;
        transition: 0.2s;
    }

    button:hover {
        transform: translateY(-1px);
        box-shadow: 0 5px 15px rgba(79, 70, 229, 0.3);
    }

    /* ===== MESSAGE ===== */
    #message {
        margin-top: 15px;
        text-align: center;
        font-size: 14px;
    }
</style>

<body>
    <form id="forgot-form">
        <div>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required />
        </div>

        <div>
            <button type="submit">Submit</button>
        </div>
    </form>

    <p id="message"></p>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script>
        const form = document.getElementById('forgot-form');
        const message = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;

            try {
                const res = await axios.post('/password/forgot-password', { email });
                message.style.color = 'green';
                message.textContent = res.data.message;
            } catch (err) {
                console.error(err);
                message.style.color = 'red';
                message.textContent = err.response?.data?.message || 'Something went wrong!';
            }
        });
    </script>
</body>

</html>
