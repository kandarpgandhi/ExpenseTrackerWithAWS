<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<link rel="stylesheet" href="style.css" />

<body>
    <div class="container">
        <div class="card">
            <h2>Login</h2>

            <form id="login-form">
                <div class="form-group">
                    <label for="login-email">Email:</label>
                    <input type="email" id="login-email" name="email" required />
                </div>

                <div class="form-group">
                    <label for="login-password">Password:</label>
                    <input type="password" id="login-password" name="password" required />
                </div>

                <button type="submit">Login</button>

                <div id="error-message" class="error"></div>

                <div class="link">
                    <a href="forget-password.html">Forgot Password?</a>
                </div>

                <div class="link">
                    <a href="index.html">Don't have an account? Sign Up</a>
                </div>
            </form>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>

        if (localStorage.getItem('token')) {
            window.location.href = '/home.html';
        }

        const loginForm = document.getElementById('login-form');
        const errorMessageDiv = document.getElementById('error-message');


        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-password').value;

            try {
                const res = await axios.post('/user/login', { email, password });
                errorMessageDiv.innerText = '';

                alert(res.data.message || 'Login successful');
                localStorage.setItem('token', res.data.token);
                window.location.href = '/home.html';
            } catch (err) {
                if (err.response && (err.response.status === 401 || err.response.status === 404)) {
                    errorMessageDiv.innerText = err.response.data.message || 'Invalid email or password';
                } else {
                    errorMessageDiv.innerText = 'Something went wrong. Please try again.';
                }
            }
        });
    </script>

    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
</body>

</html>
